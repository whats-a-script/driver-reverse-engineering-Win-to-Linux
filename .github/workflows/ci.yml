name: CI Build and Test

on:
  push:
    branches: [ main, develop, copilot/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Analysis tools check
  analyzer-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov flake8 mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
    
    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports || true
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml || true
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  # Kernel module build test
  kernel-module-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kernel: ['5.15', '6.1', '6.6']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install kernel headers
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential linux-headers-generic
    
    - name: Build network driver template
      run: |
        cd templates/drivers/network
        make clean
        make || echo "Build failed - expected for template"
    
    - name: Check for build artifacts
      run: |
        ls -la templates/drivers/network/ || true

  # Documentation build
  docs-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation
      run: |
        echo "Checking documentation files..."
        test -f README.md
        test -f docs/ARCHITECTURE.md
        test -f docs/ANALYZER-SCHEMA.md
        test -f docs/MT7927-FEASIBILITY.md
        test -f docs/LEGAL-COMPLIANCE.md
        test -f docs/SECURITY.md
        echo "All documentation files present"

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Upload security scan results
      uses: actions/upload-artifact@v3
      with:
        name: security-scan
        path: bandit-report.json
